<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I Will — Budget</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-shell" id="app-shell" style="display:none;">
  <div id="app-nav"></div>
  <main class="app-main" id="app-main">
    <div id="page-topbar"></div>
    <p class="page-eyebrow">Budget</p>
    <h1>Où en est le budget</h1>
    <p class="page-desc" id="couple-subtitle"></p>

    <div class="budget-bar-wrap">
      <div class="stat-row" style="margin-bottom:0;">
        <div class="stat-card editable" id="budget-global-card" style="border:none; padding:0;">
          <div class="label">Budget de départ</div>
          <div id="budget-global-display"></div>
        </div>
        <div class="stat-card" style="border:none; padding:0;">
          <div class="label">Déjà payé</div>
          <div class="value" id="total-paye">0 €</div>
        </div>
        <div class="stat-card" style="border:none; padding:0;">
          <div class="label">Engagé</div>
          <div class="value" id="total-engage">0 €</div>
        </div>
        <div class="stat-card" style="border:none; padding:0;">
          <div class="label">Reste disponible</div>
          <div class="value" id="total-disponible" style="color:var(--success);">—</div>
        </div>
      </div>
      <div class="budget-bar" id="budget-bar">
        <div class="seg-paye" id="seg-paye" style="width:0%"></div>
        <div class="seg-engage" id="seg-engage" style="width:0%"></div>
      </div>
      <div class="budget-legend">
        <span><span class="dot paye"></span>Payé</span>
        <span><span class="dot engage"></span>Engagé, à régler</span>
        <span><span class="dot dispo"></span>Disponible</span>
        <span style="margin-left:auto;" id="pct-label"></span>
      </div>
    </div>

    <div style="margin-bottom:16px;">
      <button class="btn-primary" id="add-row-btn">+ Ajouter un poste</button>
    </div>

    <div class="table-scroll">
      <table class="table-simple">
        <thead>
          <tr>
            <th>Poste</th>
            <th>Statut</th>
            <th>Prévu (€)</th>
            <th>Engagé (€)</th>
            <th>Payé (€)</th>
            <th>Notes</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="budget-rows"></tbody>
      </table>
    </div>
  </main>
</div>
<div class="page" id="no-couple" style="display:none;">
  <div class="invalid-panel">
    <h2>Aucun couple sélectionné</h2>
    <p><a href="dashboard.html">Retourner à l'accueil</a> pour choisir un couple.</p>
  </div>
</div>

<script src="js/config.js"></script>
<script type="module">
  import { supabase } from "./js/supabase-client.js";
  import { renderNav, coupleIdFromUrl, requireSession } from "./js/nav.js";

  const appShell = document.getElementById("app-shell");
  const noCouple = document.getElementById("no-couple");
  const rowsEl = document.getElementById("budget-rows");
  const budgetGlobalCard = document.getElementById("budget-global-card");
  const budgetGlobalDisplay = document.getElementById("budget-global-display");
  let budgetGlobal = null;
  let currentCoupleId = null;
  let currentItems = [];
  let editingBudgetGlobal = false;

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str == null ? "" : String(str);
    return div.innerHTML;
  }

  function fmt(n) {
    return Number(n || 0).toLocaleString("fr-FR") + " €";
  }

  function statusBadge(item) {
    const prevu = Number(item.montant_prevu || 0);
    const engage = Number(item.montant_engage || 0);
    const paye = Number(item.montant_paye || 0);
    const reference = engage > 0 ? engage : prevu;
    if (paye > 0 && reference > 0 && paye >= reference) return `<span class="status-badge success">Payé</span>`;
    if (engage > 0 || paye > 0) return `<span class="status-badge warn">Engagé</span>`;
    if (prevu > 0) return `<span class="status-badge neutral">À prévoir</span>`;
    return `<span class="status-badge neutral">—</span>`;
  }

  async function loadBudget(coupleId) {
    currentCoupleId = coupleId;
    const { data: brief } = await supabase.from("briefs").select("couple_nom, budget_global").eq("id", coupleId).maybeSingle();
    document.getElementById("couple-subtitle").textContent = brief?.couple_nom
      ? `Vous avez fixé une enveloppe pour ${brief.couple_nom} — voici, poste par poste, ce qui est prévu, engagé et déjà réglé.`
      : "";
    budgetGlobal = brief?.budget_global ?? null;
    renderBudgetGlobal();

    const { data: items, error } = await supabase
      .from("budget_items")
      .select("*")
      .eq("brief_id", coupleId)
      .order("created_at", { ascending: true });

    if (error) {
      rowsEl.innerHTML = `<tr><td colspan="7" class="status error">${escapeHtml(error.message)}</td></tr>`;
      return;
    }

    renderRows(items || []);
    updateTotals(items || []);
  }

  function renderBudgetGlobal() {
    if (editingBudgetGlobal) {
      budgetGlobalDisplay.innerHTML = `
        <form class="budget-global-edit" id="budget-global-form">
          <input type="number" id="budget-global-input" value="${budgetGlobal ?? ""}" placeholder="ex. 30000" autofocus />
          <button type="submit" class="btn-primary" style="padding:8px 16px;">OK</button>
        </form>
      `;
      const input = document.getElementById("budget-global-input");
      input.focus();
      input.select();
      document.getElementById("budget-global-form").addEventListener("submit", async (e) => {
        e.preventDefault();
        const value = input.value === "" ? null : Number(input.value);
        budgetGlobal = value;
        editingBudgetGlobal = false;
        renderBudgetGlobal();
        updateTotals(currentItems);
        await supabase.from("briefs").update({ budget_global: value }).eq("id", currentCoupleId);
      });
    } else if (budgetGlobal == null) {
      budgetGlobalDisplay.innerHTML = `<div class="value cta">Définir le budget de départ →</div>`;
    } else {
      budgetGlobalDisplay.innerHTML = `
        <div class="value">${fmt(budgetGlobal)}</div>
        <div class="edit-hint">✎ modifier</div>
      `;
    }
  }

  budgetGlobalCard.addEventListener("click", () => {
    if (editingBudgetGlobal) return;
    editingBudgetGlobal = true;
    renderBudgetGlobal();
  });

  function updateTotals(items) {
    currentItems = items;
    const totals = items.reduce((acc, i) => ({
      prevu: acc.prevu + Number(i.montant_prevu || 0),
      engage: acc.engage + Number(i.montant_engage || 0),
      paye: acc.paye + Number(i.montant_paye || 0),
    }), { prevu: 0, engage: 0, paye: 0 });

    document.getElementById("total-engage").textContent = fmt(totals.engage);
    document.getElementById("total-paye").textContent = fmt(totals.paye);

    const dispoEl = document.getElementById("total-disponible");
    if (budgetGlobal == null) {
      dispoEl.textContent = "—";
      dispoEl.style.color = "var(--muted)";
    } else {
      const disponible = budgetGlobal - totals.prevu;
      dispoEl.textContent = fmt(disponible);
      dispoEl.style.color = disponible < 0 ? "var(--danger)" : "var(--success)";
    }

    const base = totals.prevu > 0 ? totals.prevu : 1;
    const payePct = Math.min(100, (totals.paye / base) * 100);
    const engageRestPct = Math.min(100 - payePct, Math.max(0, ((totals.engage - totals.paye) / base) * 100));
    document.getElementById("seg-paye").style.width = payePct + "%";
    document.getElementById("seg-engage").style.width = engageRestPct + "%";

    const pct = totals.prevu > 0 ? Math.round((totals.engage / totals.prevu) * 100) : 0;
    document.getElementById("pct-label").textContent = totals.prevu > 0 ? `${pct}% de l'enveloppe engagée` : "";
  }

  function renderRows(items) {
    if (items.length === 0) {
      rowsEl.innerHTML = `<tr><td colspan="7" class="empty">Aucun poste de budget. Ajoutez-en un.</td></tr>`;
      return;
    }
    rowsEl.innerHTML = items.map((item) => `
      <tr data-id="${item.id}">
        <td><input type="text" value="${escapeHtml(item.categorie || "")}" data-field="categorie" placeholder="Catégorie" /></td>
        <td class="status-cell">${statusBadge(item)}</td>
        <td><input type="number" value="${item.montant_prevu ?? ""}" data-field="montant_prevu" /></td>
        <td><input type="number" value="${item.montant_engage ?? ""}" data-field="montant_engage" /></td>
        <td><input type="number" value="${item.montant_paye ?? ""}" data-field="montant_paye" /></td>
        <td><input type="text" value="${escapeHtml(item.notes || "")}" data-field="notes" placeholder="prestataire, notes..." /></td>
        <td><button class="btn-secondary delete-row" data-id="${item.id}">✕</button></td>
      </tr>
    `).join("");
  }

  let saveTimers = {};

  function attachRowHandlers(coupleId) {
    rowsEl.addEventListener("input", (e) => {
      const input = e.target;
      const row = input.closest("tr");
      if (!row) return;
      const id = row.dataset.id;
      const field = input.dataset.field;
      if (!id || !field) return;

      clearTimeout(saveTimers[id]);
      saveTimers[id] = setTimeout(async () => {
        const payload = {};
        row.querySelectorAll("[data-field]").forEach((el) => {
          const f = el.dataset.field;
          payload[f] = el.type === "number" ? (el.value === "" ? null : Number(el.value)) : el.value;
        });
        const { data: items } = await supabase.from("budget_items").select("*").eq("brief_id", coupleId);
        const updated = (items || []).map((i) => (i.id === id ? { ...i, ...payload } : i));
        updateTotals(updated);
        const merged = updated.find((i) => i.id === id);
        row.querySelector(".status-cell").innerHTML = statusBadge(merged);
        await supabase.from("budget_items").update(payload).eq("id", id);
      }, 600);
    });

    rowsEl.addEventListener("click", async (e) => {
      if (!e.target.classList.contains("delete-row")) return;
      const id = e.target.dataset.id;
      await supabase.from("budget_items").delete().eq("id", id);
      loadBudget(coupleId);
    });
  }

  async function init() {
    const session = await requireSession();
    if (!session) return;

    const coupleId = coupleIdFromUrl();
    if (!coupleId) {
      noCouple.style.display = "block";
      return;
    }

    appShell.style.display = "flex";
    await renderNav("budget.html");
    await loadBudget(coupleId);
    attachRowHandlers(coupleId);

    document.getElementById("add-row-btn").addEventListener("click", async () => {
      await supabase.from("budget_items").insert({ brief_id: coupleId, categorie: "Nouveau poste" });
      loadBudget(coupleId);
    });
  }

  init();
</script>
</body>
</html>
