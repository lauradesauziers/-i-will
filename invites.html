<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I Will — Invités</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-shell" id="app-shell" style="display:none;">
  <div id="app-nav"></div>
  <main class="app-main" id="app-main">
    <div id="page-topbar"></div>
    <p class="page-eyebrow">Invités</p>
    <h1>Liste &amp; réponses</h1>
    <p class="page-desc" id="summary-line">La liste alimente directement le plan de table.</p>

    <div style="margin-bottom:16px;">
      <button class="btn-primary" id="add-guest-btn">+ Ajouter un invité</button>
    </div>

    <div class="table-scroll">
      <table class="table-simple">
        <thead>
          <tr>
            <th>Nom</th>
            <th>Réponse</th>
            <th>Relation</th>
            <th>Régime</th>
            <th>Hébergement</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="guest-rows"></tbody>
      </table>
    </div>
  </main>
</div>
<div class="page" id="no-couple" style="display:none;">
  <div class="invalid-panel">
    <h2>Aucun couple sélectionné</h2>
    <p><a href="dashboard.html">Retourner à l'accueil</a> pour choisir un couple.</p>
  </div>
</div>

<script src="js/config.js"></script>
<script type="module">
  import { supabase } from "./js/supabase-client.js";
  import { renderNav, coupleIdFromUrl, requireSession } from "./js/nav.js";

  const appShell = document.getElementById("app-shell");
  const noCouple = document.getElementById("no-couple");
  const rowsEl = document.getElementById("guest-rows");
  let coupleId = null;

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str == null ? "" : String(str);
    return div.innerHTML;
  }

  async function loadGuests() {
    const { data, error } = await supabase
      .from("guests")
      .select("*")
      .eq("brief_id", coupleId)
      .order("created_at", { ascending: true });

    if (error) {
      rowsEl.innerHTML = `<tr><td colspan="6" class="status error">${escapeHtml(error.message)}</td></tr>`;
      return;
    }
    render(data || []);
  }

  function render(guests) {
    const confirmed = guests.filter((g) => g.rsvp_status === "oui").length;
    const pending = guests.filter((g) => g.rsvp_status === "en_attente").length;
    document.getElementById("summary-line").textContent =
      guests.length === 0
        ? "La liste alimente directement le plan de table."
        : `${confirmed} personne${confirmed > 1 ? "s" : ""} confirmée${confirmed > 1 ? "s" : ""} · ${pending} en attente. La liste alimente directement le plan de table.`;

    if (guests.length === 0) {
      rowsEl.innerHTML = `<tr><td colspan="6" class="empty">Aucun invité. Ajoutez-en un.</td></tr>`;
      return;
    }

    rowsEl.innerHTML = guests.map((g) => `
      <tr data-id="${g.id}">
        <td><input type="text" value="${escapeHtml(g.nom || "")}" data-field="nom" placeholder="Nom" /></td>
        <td>
          <select data-field="rsvp_status">
            <option value="en_attente" ${g.rsvp_status === "en_attente" ? "selected" : ""}>En attente</option>
            <option value="oui" ${g.rsvp_status === "oui" ? "selected" : ""}>Confirmé</option>
            <option value="non" ${g.rsvp_status === "non" ? "selected" : ""}>Refusé</option>
          </select>
        </td>
        <td>
          <select data-field="relation">
            <option value="" ${!g.relation ? "selected" : ""}>—</option>
            <option value="amis" ${g.relation === "amis" ? "selected" : ""}>Amis</option>
            <option value="famille" ${g.relation === "famille" ? "selected" : ""}>Famille</option>
            <option value="autre" ${g.relation === "autre" ? "selected" : ""}>Autre</option>
          </select>
        </td>
        <td><input type="text" value="${escapeHtml(g.regime || "")}" data-field="regime" placeholder="Régime" /></td>
        <td>
          <select data-field="hebergement">
            <option value="" ${!g.hebergement ? "selected" : ""}>—</option>
            <option value="sur_place" ${g.hebergement === "sur_place" ? "selected" : ""}>Sur place</option>
            <option value="exterieur" ${g.hebergement === "exterieur" ? "selected" : ""}>À l'extérieur</option>
          </select>
        </td>
        <td><button class="btn-secondary remove-guest" data-id="${g.id}">✕</button></td>
      </tr>
    `).join("");
  }

  let saveTimers = {};

  function attachHandlers() {
    rowsEl.addEventListener("input", (e) => {
      const input = e.target;
      const row = input.closest("tr");
      if (!row || input.tagName !== "INPUT") return;
      const id = row.dataset.id;
      clearTimeout(saveTimers[id]);
      saveTimers[id] = setTimeout(() => saveRow(row, id), 500);
    });

    rowsEl.addEventListener("change", (e) => {
      if (e.target.tagName !== "SELECT") return;
      const row = e.target.closest("tr");
      if (!row) return;
      saveRow(row, row.dataset.id);
    });

    rowsEl.addEventListener("click", async (e) => {
      if (!e.target.classList.contains("remove-guest")) return;
      await supabase.from("guests").delete().eq("id", e.target.dataset.id);
      loadGuests();
    });
  }

  async function saveRow(row, id) {
    const payload = {};
    row.querySelectorAll("[data-field]").forEach((el) => {
      payload[el.dataset.field] = el.value || null;
    });
    await supabase.from("guests").update(payload).eq("id", id);
  }

  async function init() {
    const session = await requireSession();
    if (!session) return;

    coupleId = coupleIdFromUrl();
    if (!coupleId) {
      noCouple.style.display = "block";
      return;
    }

    appShell.style.display = "flex";
    await renderNav("invites.html");

    await loadGuests();
    attachHandlers();

    document.getElementById("add-guest-btn").addEventListener("click", async () => {
      await supabase.from("guests").insert({ brief_id: coupleId, nom: "Nouvel invité" });
      loadGuests();
    });
  }

  init();
</script>
</body>
</html>
