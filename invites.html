<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I Will — Invités</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-shell" id="app-shell" style="display:none;">
  <div id="app-nav"></div>
  <main class="app-main" id="app-main">
    <div id="page-topbar"></div>
    <p class="page-eyebrow">Invités</p>
    <h1>Liste &amp; réponses</h1>
    <p class="page-desc" id="summary-line">La liste alimente directement le plan de table.</p>

    <div style="margin-bottom:16px;">
      <button class="btn-primary" id="add-foyer-btn">+ Ajouter un foyer</button>
    </div>

    <div class="foyer-row" style="cursor:default; background:var(--cream); font-size:11px; font-weight:700; letter-spacing:0.04em; text-transform:uppercase; color:var(--muted); border:1px solid var(--border); border-bottom:none; border-radius:12px 12px 0 0;">
      <span>Foyer</span><span>Réponse</span><span>Pers.</span><span>Régime</span><span>Hébergement</span>
    </div>
    <div class="task-list" id="foyer-list" style="border-radius:0 0 12px 12px;"></div>
  </main>
</div>
<div class="page" id="no-couple" style="display:none;">
  <div class="invalid-panel">
    <h2>Aucun couple sélectionné</h2>
    <p><a href="dashboard.html">Retourner à l'accueil</a> pour choisir un couple.</p>
  </div>
</div>

<script src="js/config.js"></script>
<script type="module">
  import { supabase } from "./js/supabase-client.js";
  import { renderNav, coupleIdFromUrl, requireSession } from "./js/nav.js";

  const appShell = document.getElementById("app-shell");
  const noCouple = document.getElementById("no-couple");
  const listEl = document.getElementById("foyer-list");
  let coupleId = null;
  let allGuests = [];
  let openFoyer = null;

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str == null ? "" : String(str);
    return div.innerHTML;
  }

  const rsvpLabels = { oui: "confirmé", en_attente: "en attente", non: "refusé" };

  function groupByFoyer(guests) {
    const groups = {};
    guests.forEach((g) => {
      const key = g.foyer || g.nom;
      (groups[key] = groups[key] || []).push(g);
    });
    return groups;
  }

  async function loadGuests() {
    const { data, error } = await supabase
      .from("guests")
      .select("*")
      .eq("brief_id", coupleId)
      .order("created_at", { ascending: true });

    if (error) {
      listEl.innerHTML = `<p class="status error" style="padding:16px;">${escapeHtml(error.message)}</p>`;
      return;
    }
    allGuests = data || [];
    render();
  }

  function render() {
    const confirmed = allGuests.filter((g) => g.rsvp_status === "oui").length;
    const pending = allGuests.filter((g) => g.rsvp_status === "en_attente").length;
    document.getElementById("summary-line").textContent =
      allGuests.length === 0
        ? "La liste alimente directement le plan de table."
        : `${confirmed} personne${confirmed > 1 ? "s" : ""} confirmée${confirmed > 1 ? "s" : ""} · ${pending} en attente. La liste alimente directement le plan de table.`;

    if (allGuests.length === 0) {
      listEl.innerHTML = `<p class="empty" style="padding:24px;">Aucun invité. Ajoutez un foyer.</p>`;
      return;
    }

    const groups = groupByFoyer(allGuests);
    listEl.innerHTML = Object.entries(groups).map(([foyerName, members]) => foyerBlock(foyerName, members)).join("");
    attachHandlers();
  }

  function foyerBlock(foyerName, members) {
    if (foyerName === openFoyer) {
      return `
        <div class="foyer-edit" data-foyer="${escapeHtml(foyerName)}">
          <div style="font-weight:600; margin-bottom:10px;">${escapeHtml(foyerName)}</div>
          ${members.map((g) => `
            <div class="foyer-person-row" data-id="${g.id}">
              <input type="text" data-field="nom" value="${escapeHtml(g.nom || "")}" placeholder="Nom" />
              <select data-field="rsvp_status">
                <option value="en_attente" ${g.rsvp_status === "en_attente" ? "selected" : ""}>En attente</option>
                <option value="oui" ${g.rsvp_status === "oui" ? "selected" : ""}>Confirmé</option>
                <option value="non" ${g.rsvp_status === "non" ? "selected" : ""}>Refusé</option>
              </select>
              <input type="text" data-field="regime" value="${escapeHtml(g.regime || "")}" placeholder="Régime" />
              <select data-field="hebergement">
                <option value="" ${!g.hebergement ? "selected" : ""}>Hébergement</option>
                <option value="sur_place" ${g.hebergement === "sur_place" ? "selected" : ""}>Sur place</option>
                <option value="exterieur" ${g.hebergement === "exterieur" ? "selected" : ""}>À l'extérieur</option>
              </select>
              <button class="remove-guest" data-id="${g.id}" title="Retirer">✕</button>
            </div>
          `).join("")}
          <div class="edit-actions" style="margin-top:6px;">
            <button class="edit-close" id="add-person-btn" data-foyer="${escapeHtml(foyerName)}">+ Ajouter une personne à ce foyer</button>
            <button class="edit-close" id="close-foyer-btn">Fermer</button>
          </div>
        </div>
      `;
    }

    const rsvpCounts = members.reduce((acc, g) => { acc[g.rsvp_status] = (acc[g.rsvp_status] || 0) + 1; return acc; }, {});
    const mainStatus = rsvpCounts.non ? "non" : rsvpCounts.en_attente ? "en_attente" : "oui";
    const regimes = members.map((g) => g.regime).filter(Boolean).join(", ");
    const hebergements = [...new Set(members.map((g) => g.hebergement).filter(Boolean))];

    return `
      <div class="foyer-row" data-open="${escapeHtml(foyerName)}">
        <span class="foyer-name">${escapeHtml(foyerName)}</span>
        <span><span class="rsvp-badge ${mainStatus}">${rsvpLabels[mainStatus]}</span></span>
        <span class="foyer-cell">${members.length}</span>
        <span class="foyer-cell">${regimes ? escapeHtml(regimes) : "—"}</span>
        <span class="foyer-cell">${hebergements.length === 1 ? `<span class="stay-badge">${hebergements[0] === "sur_place" ? "sur place" : "à l'extérieur"}</span>` : "—"}</span>
      </div>
    `;
  }

  let saveTimers = {};

  function attachHandlers() {
    listEl.querySelectorAll("[data-open]").forEach((row) => {
      row.addEventListener("click", () => {
        openFoyer = row.dataset.open;
        render();
      });
    });

    const editPanel = listEl.querySelector(".foyer-edit");
    if (!editPanel) return;

    editPanel.addEventListener("click", (e) => e.stopPropagation());

    editPanel.addEventListener("input", (e) => {
      const row = e.target.closest(".foyer-person-row");
      if (!row) return;
      const id = row.dataset.id;
      clearTimeout(saveTimers[id]);
      saveTimers[id] = setTimeout(async () => {
        const payload = {};
        row.querySelectorAll("[data-field]").forEach((el) => {
          payload[el.dataset.field] = el.value || null;
        });
        await supabase.from("guests").update(payload).eq("id", id);
        const g = allGuests.find((x) => x.id === id);
        if (g) Object.assign(g, payload);
      }, 500);
    });

    editPanel.addEventListener("change", (e) => {
      if (e.target.tagName !== "SELECT") return;
      const row = e.target.closest(".foyer-person-row");
      if (!row) return;
      const id = row.dataset.id;
      const payload = {};
      row.querySelectorAll("[data-field]").forEach((el) => {
        payload[el.dataset.field] = el.value || null;
      });
      supabase.from("guests").update(payload).eq("id", id).then(() => {
        const g = allGuests.find((x) => x.id === id);
        if (g) Object.assign(g, payload);
      });
    });

    editPanel.querySelectorAll(".remove-guest").forEach((btn) => {
      btn.addEventListener("click", async (e) => {
        e.stopPropagation();
        await supabase.from("guests").delete().eq("id", btn.dataset.id);
        openFoyer = null;
        loadGuests();
      });
    });

    const addPersonBtn = document.getElementById("add-person-btn");
    if (addPersonBtn) {
      addPersonBtn.addEventListener("click", async (e) => {
        e.stopPropagation();
        await supabase.from("guests").insert({
          brief_id: coupleId,
          nom: "Nouvelle personne",
          foyer: addPersonBtn.dataset.foyer,
        });
        loadGuests();
      });
    }

    const closeBtn = document.getElementById("close-foyer-btn");
    if (closeBtn) {
      closeBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        openFoyer = null;
        render();
      });
    }
  }

  async function init() {
    const session = await requireSession();
    if (!session) return;

    coupleId = coupleIdFromUrl();
    if (!coupleId) {
      noCouple.style.display = "block";
      return;
    }

    appShell.style.display = "flex";
    await renderNav("invites.html");

    await loadGuests();

    document.getElementById("add-foyer-btn").addEventListener("click", async () => {
      const { data } = await supabase
        .from("guests")
        .insert({ brief_id: coupleId, nom: "Nouveau foyer" })
        .select()
        .single();
      openFoyer = data.nom;
      loadGuests();
    });
  }

  init();
</script>
</body>
</html>
