<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I Will — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="page" id="login-screen">
  <div class="login-box">
    <p class="logo" style="text-align:center;">I Will</p>
    <p class="tagline" style="text-align:center; color:var(--muted); margin-bottom:24px;">Espace couple</p>
    <form id="login-form">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required />
      </div>
      <div class="field">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" required />
      </div>
      <div class="actions">
        <button type="submit" class="primary">Se connecter</button>
        <div id="login-status" class="status error"></div>
      </div>
    </form>
  </div>
</div>

<script src="js/config.js"></script>
<script type="module">
  import { supabase } from "./js/supabase-client.js";

  const loginForm = document.getElementById("login-form");
  const loginStatus = document.getElementById("login-status");

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    loginStatus.textContent = "";
    if (!supabase) {
      loginStatus.textContent = "Configuration manquante — voir le bandeau en haut de page.";
      return;
    }
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data: token, error } = await supabase.rpc("couple_login", { p_email: email, p_password: password });
    if (error || !token) {
      loginStatus.textContent = "Email ou mot de passe incorrect.";
      return;
    }
    location.href = `brief.html?t=${token}`;
  });
</script>
</body>
</html>
