<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>I Will — Tâches</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="app-shell" id="app-shell" style="display:none;">
  <div id="app-nav"></div>
  <main class="app-main" id="app-main">
    <div id="page-topbar"></div>
    <p class="page-eyebrow">Tâches</p>
    <h1>Ce qu'il reste à faire</h1>
    <p class="page-desc">Assignez chaque tâche à vous ou au couple, avec une échéance.</p>

    <div style="margin-bottom:16px;">
      <button class="btn-primary" id="add-task-btn">+ Ajouter une tâche</button>
    </div>

    <div class="table-scroll">
      <table class="table-simple">
        <thead>
          <tr>
            <th style="width:36px;"></th>
            <th>Titre</th>
            <th>Assigné à</th>
            <th>Échéance</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="task-rows"></tbody>
      </table>
    </div>
  </main>
</div>
<div class="page" id="no-couple" style="display:none;">
  <div class="invalid-panel">
    <h2>Aucun couple sélectionné</h2>
    <p><a href="dashboard.html">Retourner à l'accueil</a> pour choisir un couple.</p>
  </div>
</div>

<script src="js/config.js"></script>
<script type="module">
  import { supabase } from "./js/supabase-client.js";
  import { renderNav, coupleIdFromUrl, requireSession } from "./js/nav.js";

  const appShell = document.getElementById("app-shell");
  const noCouple = document.getElementById("no-couple");
  const rowsEl = document.getElementById("task-rows");
  let coupleId = null;

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str == null ? "" : String(str);
    return div.innerHTML;
  }

  async function loadTasks() {
    const { data: tasks, error } = await supabase
      .from("tasks")
      .select("*")
      .eq("brief_id", coupleId)
      .order("done", { ascending: true })
      .order("due_date", { ascending: true, nullsFirst: false });

    if (error) {
      rowsEl.innerHTML = `<tr><td colspan="5" class="status error">${escapeHtml(error.message)}</td></tr>`;
      return;
    }
    renderRows(tasks || []);
  }

  function renderRows(tasks) {
    if (tasks.length === 0) {
      rowsEl.innerHTML = `<tr><td colspan="5" class="empty">Aucune tâche. Ajoutez-en une.</td></tr>`;
      return;
    }
    rowsEl.innerHTML = tasks.map((t) => `
      <tr data-id="${t.id}" style="${t.done ? "opacity:0.5;" : ""}">
        <td><input type="checkbox" data-field="done" ${t.done ? "checked" : ""} /></td>
        <td><input type="text" value="${escapeHtml(t.titre || "")}" data-field="titre" /></td>
        <td>
          <select data-field="assignee">
            <option value="laura" ${t.assignee === "laura" ? "selected" : ""}>Laura</option>
            <option value="couple" ${t.assignee === "couple" ? "selected" : ""}>Couple</option>
          </select>
        </td>
        <td><input type="date" value="${t.due_date || ""}" data-field="due_date" /></td>
        <td><button class="btn-secondary delete-row" data-id="${t.id}">✕</button></td>
      </tr>
    `).join("");
  }

  let saveTimers = {};

  function attachHandlers() {
    rowsEl.addEventListener("change", (e) => {
      const row = e.target.closest("tr");
      if (!row) return;
      const id = row.dataset.id;
      const field = e.target.dataset.field;
      if (!id || !field) return;

      clearTimeout(saveTimers[id]);
      saveTimers[id] = setTimeout(async () => {
        const payload = {};
        row.querySelectorAll("[data-field]").forEach((el) => {
          const f = el.dataset.field;
          if (el.type === "checkbox") payload[f] = el.checked;
          else payload[f] = el.value || null;
        });
        await supabase.from("tasks").update(payload).eq("id", id);
        if (field === "done") loadTasks();
      }, field === "done" ? 0 : 500);
    });

    rowsEl.addEventListener("click", async (e) => {
      if (!e.target.classList.contains("delete-row")) return;
      await supabase.from("tasks").delete().eq("id", e.target.dataset.id);
      loadTasks();
    });
  }

  async function init() {
    const session = await requireSession();
    if (!session) return;

    coupleId = coupleIdFromUrl();
    if (!coupleId) {
      noCouple.style.display = "block";
      return;
    }

    appShell.style.display = "flex";
    await renderNav("taches.html");

    await loadTasks();
    attachHandlers();

    document.getElementById("add-task-btn").addEventListener("click", async () => {
      await supabase.from("tasks").insert({ brief_id: coupleId, titre: "Nouvelle tâche", assignee: "laura" });
      loadTasks();
    });
  }

  init();
</script>
</body>
</html>
